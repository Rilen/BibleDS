<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <title>BibleDS – Estudo e Análise Bíblica</title>
  <base href="/" />
  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Aplicativo de leitura e análise bíblica com suporte às versões NVI, Bíblia de Jerusalém, ACF e outras. Busca por palavras-chave em toda a Bíblia." />
  <meta name="theme-color" content="#3880ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
</head>

<body>
  <app-root>
    <style>
      :root {
        --app-bg: #0d0d1a;
        --accent: #4a6cf7;
        --accent-glow: rgba(74, 108, 247, 0.4);
      }

      .splash-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: var(--app-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
        color: #fff;
      }

      .logo-box {
        position: relative;
        margin-bottom: 30px;
        animation: pulse 2s infinite ease-in-out;
      }

      .logo-letter {
        font-size: 64px;
        font-weight: 900;
        background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 15px var(--accent-glow));
      }

      .app-name {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 4px;
        opacity: 0.9;
        margin-bottom: 40px;
        text-transform: uppercase;
      }

      /* Barra de Progresso elegante */
      .loader-bar {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }

      .loader-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: loading 1.5s infinite linear;
      }

      .status-text {
        margin-top: 15px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      @keyframes loading {
        0% {
          left: -100%;
        }

        100% {
          left: 100%;
        }
      }

      @keyframes pulse {

        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }
    </style>

    <div class="splash-container">
      <div class="logo-box">
        <span class="logo-letter">DS</span>
      </div>
      <div class="app-name">BíbliaDS</div>
      <div class="loader-bar"></div>
      <div class="status-text">Inicializando biblioteca sagrada...</div>
    </div>
  </app-root>
</body>

</html>
